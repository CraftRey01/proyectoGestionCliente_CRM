{% extends "base.html" %}
{% block title %}Editar Pedido{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0">Modificar Pedido</h4>
            </div>
            <div class="card-body">
                <form action="/pedidos/editar/{{ pedido.id_pedido }}" method="POST">
                    <div class="mb-3">
                        <label for="id_pedido" class="form-label">Id Pedido</label>
                        <input type="number" class="form-control" id="id_pedido" name="id_pedido"
                            value="{{ pedido.id_pedido }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="fecha_pedido" class="form-label">Fecha Pedido</label>
                        <input type="datetime-local" class="form-control" id="fecha_pedido" name="fecha_pedido"
                            value="{{ pedido.fecha_pedido }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="estado" class="form-label">Estado de Pedido</label>
                        <select class="form-select" id="estado" name="estado" required>
                            <option value="confirmado" {% if pedido.estado=='confirmado' %}selected{% endif %}>
                                Confirmado</option>
                            <option value="pendiente" {% if pedido.estado=='pendiente' %}selected{% endif %}>
                                Pendiente</option>
                            <option value="cancelado" {% if pedido.estado=='cancelado' %}selected{% endif %}>
                                Cancelado</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="id_venta" class="form-label">Id Venta</label>
                        <input type="number" class="form-control" id="id_venta" name="id_venta"
                            value="{{ pedido.id_venta }}" required>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="/pedidos" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Actualizar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
