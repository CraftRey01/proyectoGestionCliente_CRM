{% extends "base.html" %}
{% block title %}Crear Venta{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Registrar Nueva Venta</h4>
            </div>
            <div class="card-body">
                <form action="nuevo" method="POST">
                    <div class="mb-3">
                        <label for="id_venta" class="form-label">Id Venta</label>
                        <input type="number" class="form-control" id="id_venta" name="id_venta" required>
                    </div>
                    <div class="mb-3">
                        <label for="fecha_venta" class="form-label">Fecha Venta</label>
                        <input type="datetime-local" class="form-control" id="fecha_venta" name="fecha_venta" required>
                    </div>
                    <div class="mb-3">
                        <label for="estado_venta" class="form-label">Estado de Venta</label>
                        <select class="form-select" id="estado_venta" name="estado_venta" required>
                            <option value="" selected disabled>Seleccionar Estado</option>
                            <option value="facturada">Facturada</option>
                            <option value="pendiente">Pendiente</option>
                            <option value="cancelada">Cancelada</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="monto_total" class="form-label">Monto Total</label>
                        <input type="number" step="0.01" class="form-control" id="monto_total" name="monto_total"
                            required>
                    </div>
                    <div class="mb-3">
                        <label for="id_cliente" class="form-label">Cliente</label>
                        <select class="form-select" id="id_cliente" name="id_cliente" required>
                            <option value="" selected disabled>Cliente</option>
                            {% for cliente in clientes %}
                            <option value="{{ cliente.id_cliente }}">{{ cliente.nombre_cliente }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="id_usuario" class="form-label">Usuario(Vendedor) Encargado</label>
                        <select class="form-select" id="id_usuario" name="id_usuario" required>
                            <option value="" selected disabled>Seleccione un usuario</option>
                            {% for usuario in usuarios %}
                            <option value="{{ usuario.id_usuario }}">{{ usuario.nombre_usuario }} ({{ usuario.rol }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="id_cotizacion" class="form-label">Id Cotizacion</label>
                        <input type="number" class="form-control" id="id_cotizacion" name="id_cotizacion" required>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="../ventas" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success">Guardar Registro</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
