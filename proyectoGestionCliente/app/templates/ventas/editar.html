{% extends "base.html" %}
{% block title %}Editar Venta{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0">Modificar Venta</h4>
            </div>
            <div class="card-body">
                <form action="/ventas/editar/{{ venta.id_venta }}" method="POST">
                    <div class="mb-3">
                        <label for="id_venta" class="form-label">Id Venta</label>
                        <input type="number" class="form-control" id="id_venta" name="id_venta"
                            value="{{ venta.id_venta }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="fecha_venta" class="form-label">Fecha Venta</label>
                        <input type="datetime-local" class="form-control" id="fecha_venta" name="fecha_venta"
                            value="{{ venta.fecha_venta.strftime('%Y-%m-%dT%H:%M') if venta.fecha_venta else '' }}"
                            required>
                    </div>
                    <div class="mb-3">
                        <label for="estado_venta" class="form-label">Estado de Venta</label>
                        <select class="form-select" id="estado_venta" name="estado_venta" required>
                            <option value="facturado" {% if venta.estado_venta=='facturado' %}selected{% endif %}>
                                Facturada
                            </option>
                            <option value="pendiente" {% if venta.estado_venta=='pendiente' %}selected{% endif %}>
                                Pendiente
                            </option>
                            <option value="cancelada" {% if venta.estado_venta=='cancelada' %}selected{% endif %}>
                                Cancelada
                            </option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="monto_total" class="form-label">Monto Total</label>
                        <input type="number" step="0.01" class="form-control" id="monto_total" name="monto_total"
                            value="{{ venta.monto_total }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_cliente" class="form-label">Cliente</label>
                        <select class="form-select" id="id_cliente" name="id_cliente" required>
                            <option value="" disabled>Seleccione un cliente</option>
                            {% for cliente in clientes %}
                            <option value="{{ cliente.id_cliente }}" {% if cliente.id_cliente==venta.id_cliente
                                %}selected{% endif %}>
                                {{ cliente.nombre_cliente }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="id_usuario" class="form-label">Usuario(Vendedor) Encargado</label>
                        <select class="form-select" id="id_usuario" name="id_usuario" required>
                            <option value="" disabled>Seleccione un usuario</option>
                            {% for usuario in usuarios %}
                            <option value="{{ usuario.id_usuario }}" {% if usuario.id_usuario==venta.id_usuario
                                %}selected{% endif %}>
                                {{ usuario.nombre_usuario }} ({{ usuario.rol }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="id_cotizacion" class="form-label">Id Cotizacion</label>
                        <input type="number" class="form-control" id="id_cotizacion" name="id_cotizacion"
                            value="{{ venta.id_cotizacion }}" required>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="/ventas" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Actualizar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
