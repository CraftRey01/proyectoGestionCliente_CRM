{% extends "base.html" %}
{% block title %}Editar Oportunidad{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0">Modificar Oportunidad</h4>
            </div>
            <div class="card-body">
                <form action="/oportunidades/editar/{{ oportunidad.id_oportunidad }}" method="POST">
                    <div class="mb-3">
                        <label for="id_oportunidad" class="form-label">Id Oportunidad</label>
                        <input type="number" class="form-control" id="id_oportunidad" name="id_oportunidad"
                            value="{{ oportunidad.id_oportunidad }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="descripcion" class="form-label">Descripcion</label>
                        <input type="text" class="form-control" id="descripcion" name="descripcion"
                            value="{{ oportunidad.descripcion }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="monto_estimado" class="form-label">Monto Estimado</label>
                        <input type="number" step="0.01" class="form-control" id="monto_estimado" name="monto_estimado"
                            value="{{ oportunidad.monto_estimado }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="estado" class="form-label">Estado</label>
                        <select class="form-select" id="estado" name="estado" required>
                            <option value="abierta" {% if oportunidad.estado=='abierta' %}selected{% endif %}>Abierta
                            </option>
                            <option value="en proceso" {% if oportunidad.estado=='en proceso' %}selected{% endif %}>En
                                Proceso</option>
                            <option value="cerrada" {% if oportunidad.estado=='cerrada' %}selected{% endif %}>Cerrada
                            </option>
                            <option value="perdida" {% if oportunidad.estado=='perdida' %}selected{% endif %}>Perdida
                            </option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="id_cliente" class="form-label">Cliente</label>
                        <select class="form-select" id="id_cliente" name="id_cliente" required>
                            <option value="" disabled>Seleccione un cliente</option>
                            {% for cliente in clientes %}
                            <option value="{{ cliente.id_cliente }}" {% if cliente.id_cliente==oportunidad.id_cliente
                                %}selected{% endif %}>
                                {{ cliente.nombre_cliente }}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="id_usuario" class="form-label">Usuario(Vendedor) Encargado</label>
                        <select class="form-select" id="id_usuario" name="id_usuario" required>
                            <option value="" disabled>Seleccione un usuario</option>
                            {% for usuario in usuarios %}
                            <option value="{{ usuario.id_usuario }}" {% if usuario.id_usuario==oportunidad.id_usuario
                                %}selected{% endif %}>
                                {{ usuario.nombre_usuario }} ({{ usuario.rol }})
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="/oportunidades" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Actualizar Cambios</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
