{% extends "base.html" %}
{% block title %}Crear Factura{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Registrar Nuevo Factura</h4>
            </div>
            <div class="card-body">
                <form action="nuevo" method="POST">
                    <div class="mb-3">
                        <label for="id_factura" class="form-label">Id Factura</label>
                        <input type="number" class="form-control" id="id_factura" name="id_factura" required>
                    </div>
                    <div class="mb-3">
                        <label for="numero_factura" class="form-label">Numero Factura</label>
                        <input type="text" class="form-control" id="numero_factura" name="numero_factura" required>
                    </div>
                    <div class="mb-3">
                        <label for="fecha_emision" class="form-label">Fecha Emision</label>
                        <input type="datetime-local" class="form-control" id="fecha_emision" name="fecha_emision"
                            required>
                    </div>
                    <div class="mb-3">
                        <label for="estado" class="form-label">Estado de Factura</label>
                        <select class="form-select" id="estado" name="estado" required>
                            <option value="" selected disabled>Seleccionar Estado</option>
                            <option value="emitida">Emitida</option>
                            <option value="anulada">Anulada</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="total" class="form-label">Total</label>
                        <input type="number" step="0.01" class="form-control" id="total" name="total" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_venta" class="form-label">Id Venta</label>
                        <input type="number" class="form-control" id="id_venta" name="id_venta" required>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="../facturas" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success">Guardar Registro</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
