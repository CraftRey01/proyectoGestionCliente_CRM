<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CRM Sistema de Gestión</title>
    <!--css y js local-->
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/rol.js"></script>
    <!-- Option 1: Include in HTML -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.3.0/font/bootstrap-icons.css">
    <!-- Bootstrap CSS and JS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
</head>

<body class="m-0 p-0">
    <section class="background-image-container overflow-hidden d-flex align-items-center justify-content-center">
        <div class="container px-4 py-5 px-md-5 text-center text-lg-start w-100">
            <div class="row gx-lg-5 align-items-center justify-content-center w-100">
                <!-- contenedor de letras-->
                <div class="col-lg-6 mb-5 mb-lg-0 d-none d-lg-block" style="z-index: 10">
                    <h1 class="my-5 display-5 fw-bold ls-tight" style="color: white;">
                        Sistema de Gestión <br />
                        <span style="color: hsl(218, 81%, 75%)">de Clientes</span>
                    </h1>
                    <p class="mb-4 opacity-70" style="color: hsl(218, 81%, 85%); font-size: 18px;">
                        Accede a tu cuenta para gestionar clientes, campañas, ventas y más.
                    </p>
                </div>
                <!-- Login form -->
                <div class="col-lg-6 mb-5 mb-lg-0 position-relative">
                    <div id="radius-shape-1" class="position-absolute rounded-circle shadow-5-strong"></div>
                    <div id="radius-shape-2" class="position-absolute shadow-5-strong"></div>

                    <div class="login-container">
                        <div class="card bg-glass shadow-lg border-0">
                            <div class="card-body px-4 py-5 px-md-5">
                                <h2 class="login-title">
                                    Iniciar Sesión
                                </h2>
                                {% if error %}
                                <div class="alert alert-danger alert-dismissible fade show" role="alert">
                                    {{ error }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert"
                                        aria-label="Close"></button>
                                </div>
                                {% endif %}
                                <form action="/login" method="POST" novalidate>
                                    <!-- Usuario datos -->
                                    <div class="mb-4">
                                        <label class="form-label" for="nombre_usuario">
                                            Usuario
                                        </label>
                                        <input type="text" id="nombre_usuario" name="nombre_usuario"
                                            class="form-control form-control-lg" placeholder="Ingresa tu usuario"
                                            required autofocus>
                                    </div>
                                    <!-- contraseña -->
                                    <div class="mb-4">
                                        <label class="form-label" for="contrasena">
                                            Contraseña
                                        </label>
                                        <input type="password" id="contrasena" name="contrasena"
                                            class="form-control form-control-lg" placeholder="Ingresa tu contraseña"
                                            required>
                                    </div>
                                    <!-- Rol input -->
                                    <div class="mb-4">
                                        <label class="form-label" for="rol">
                                            Rol
                                        </label>
                                        <select id="rol" name="rol" class="form-control form-control-lg" required>
                                            <option value="">Selecciona un rol...</option>
                                        </select>
                                    </div>
                                    <!-- boton -->
                                    <button type="submit" class="btn btn-login btn-lg w-100 text-white">
                                        Ingresar
                                    </button>
                                </form>
                                <!-- Register buttons -->
                                <div class="text-center">
                                    <p>Contactanos por:</p>

                                    <a href="https://www.facebook.com/profile.php?id=61590501155242" target="_blank"
                                        rel="noopener" class="btn btn-link btn-floating mx-1">
                                        <i class="bi bi-facebook"></i>
                                    </a>

                                    <a href="https://wa.me/5490000000000" target="_blank" rel="noopener"
                                        class="btn btn-link btn-floating mx-1">
                                        <i class="bi bi-whatsapp"></i>
                                    </a>

                                    <a href="https://github.com/CraftRey01/proyectoGestionCliente_CRM" target="_blank"
                                        rel="noopener" class="btn btn-link btn-floating mx-1">
                                        <i class="bi bi-github"></i>
                                    </a>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
